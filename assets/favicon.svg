<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="32" fill="#c47a1a"/>
  <g transform="rotate(-12 32 32)">
    <!-- Top strokes poking above the G -->
    <line x1="28" y1="11" x2="28" y2="19" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="36" y1="11" x2="36" y2="19" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <!-- Bottom strokes poking below the G -->
    <line x1="28" y1="45" x2="28" y2="53" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="36" y1="45" x2="36" y2="53" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <!-- G letter -->
    <text x="33" y="33" text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-weight="bold" font-size="40" fill="#fff">G</text>
  </g>
